<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>밀폐시약장 안내 | 서산명지중 과학실 안전 대시보드</title>
<meta name="description" content="서산명지중학교 과학실 밀폐시약장 8칸 배치와 칸별 화학물질, MSDS 연동 안내" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary-container": "#2563eb",
          "on-primary": "#ffffff",
          "error": "#ba1a1a",
          "on-error": "#ffffff",
          "on-error-container": "#93000a",
          "tertiary": "#006329",
          "tertiary-fixed-dim": "#62df7d",
          "secondary-container": "#e02928",
          "surface": "#f9f9ff",
          "background": "#f9f9ff",
          "surface-bright": "#f9f9ff",
          "surface-container-low": "#f0f3ff",
          "surface-container-lowest": "#ffffff",
          "surface-container-high": "#dee8ff",
          "on-surface": "#111c2d",
          "on-surface-variant": "#44474e",
          "outline": "#737686",
          "outline-variant": "#c4c6d0",
          "inverse-on-surface": "#ecf1ff"
        },
        borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
        spacing: { gutter: "16px", "stack-lg": "32px", "stack-md": "12px", "stack-sm": "4px", "container-padding": "24px", base: "8px" },
        fontFamily: {
          "headline-lg": ["Hanken Grotesk"], "headline-md": ["Hanken Grotesk"],
          "body-md": ["Hanken Grotesk"], "body-lg": ["Hanken Grotesk"]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .chem-chip { display: inline-flex; align-items: center; }
  .chem-chip.special { border-color: #ba1a1a; background: #fff1f0; color: #93000a; }
  .door-tab.active { background: #2563eb; color: #fff; }
  .shelf-panel.active { display: block; }
  .shelf-panel { display: none; }
</style>
</head>
<body class="bg-background text-on-surface font-body-md text-body-md min-h-screen">

<div class="max-w-6xl mx-auto p-container-padding">

  <a href="index.html" class="inline-flex items-center gap-1 text-primary-container text-sm mb-stack-md hover:underline">
    <span class="material-symbols-outlined text-[18px]">arrow_back</span> 대시보드로 돌아가기
  </a>

  <header class="bg-surface rounded-xl border border-outline-variant shadow-sm p-container-padding mb-stack-lg flex flex-col md:flex-row gap-stack-lg items-start">
    <img src="reagent-cabinet.png" alt="과학실 밀폐시약장 (문 4개, 각 상/하 2단)"
         class="w-full md:w-64 rounded-lg border border-outline-variant object-cover shrink-0" />
    <div>
      <h1 class="text-headline-md font-headline-md font-bold text-on-surface flex items-center gap-2">
        <span class="material-symbols-outlined text-primary-container">inventory_2</span>
        밀폐시약장 안내
      </h1>
      <p class="text-on-surface-variant mt-2 leading-relaxed">
        문 4개 × 상/하 2단 = 총 8칸으로 구성되어 있습니다. 왼쪽에서 문(칸)을 선택하면
        해당 문의 상단/하단에 보관 중인 화학물질이 표시됩니다. 물질명을 클릭하면 이름이
        자동 복사되고 안전보건공단(KOSHA) MSDS 검색 페이지가 새 탭으로 열립니다 —
        열린 페이지 검색창에 <b>Ctrl+V</b>로 붙여넣으면 바로 조회할 수 있어요.
      </p>
      <p class="mt-3 text-sm inline-flex items-center gap-1 px-3 py-1 rounded-full bg-error/10 text-on-error-container border border-error/30 w-fit">
        <span class="material-symbols-outlined text-[16px]">warning</span>
        붉은 테두리 항목(⚠)은 학교 운영계획서 기준 <b>극약</b> 물질로 이중 잠금 보관이 필요합니다.
      </p>
    </div>
  </header>

  <div class="flex items-center justify-between mb-stack-md">
    <div id="authStatus" class="text-sm text-on-surface-variant"></div>
    <div class="flex items-center gap-2">
      <button id="manageBtn" class="hidden px-3 py-1.5 rounded-lg bg-primary-container text-on-primary text-sm font-medium hover:opacity-90 transition">🧪 시약 추가/제거</button>
      <button id="authBtn" class="px-3 py-1.5 rounded-lg border border-outline-variant text-sm bg-surface hover:bg-surface-container-low transition">🔒 교사 인증</button>
    </div>
  </div>

  <!-- 추가/제거 모달 -->
  <div id="manageModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
    <div class="bg-surface rounded-xl shadow-lg max-w-md w-full p-container-padding" id="manageModalBody"></div>
  </div>

  <div class="flex flex-col md:flex-row gap-stack-lg">

    <!-- 왼쪽: 문 선택 -->
    <nav class="md:w-56 shrink-0 bg-surface rounded-xl border border-outline-variant shadow-sm p-stack-md h-fit">
      <h2 class="text-sm font-bold text-on-surface-variant mb-stack-sm px-2">문 선택</h2>
      <div id="doorTabs" class="flex md:flex-col gap-2"></div>
    </nav>

    <!-- 오른쪽: 선택한 문의 상/하단 내용 -->
    <main class="flex-1 space-y-stack-lg" id="doorPanels"></main>

  </div>
</div>

<script src="reagent-data.js"></script>
<script>
  const doorTabsEl = document.getElementById('doorTabs');
  const doorPanelsEl = document.getElementById('doorPanels');
  const authBtn = document.getElementById('authBtn');
  const authStatusEl = document.getElementById('authStatus');
  let currentDoorId = REAGENT_DOORS[0].id;

  function chipHtml(item) {
    const specialCls = item.special ? 'special' : '';
    const warn = item.special ? ' ⚠' : '';
    const safeName = item.name.replace(/'/g, "\\'");
    let manage = '';
    if (teacherAuth.authenticated) {
      manage = `
        <button title="사용 기록 남기기" onclick="event.stopPropagation(); handleUse('${safeName}')"
          class="ml-1 text-on-surface-variant hover:text-primary-container">
          <span class="material-symbols-outlined text-[15px] align-middle">edit_note</span>
        </button>
        <button title="재고에서 제거" onclick="event.stopPropagation(); handleRemove('${safeName}')"
          class="text-on-surface-variant hover:text-error">
          <span class="material-symbols-outlined text-[15px] align-middle">close</span>
        </button>`;
    }
    return `<span class="chem-chip ${specialCls} px-3 py-1.5 rounded-full border border-outline-variant bg-surface-container-low text-sm">
        <button class="hover:text-primary-container transition" onclick="openMsds('${safeName}')">${item.name}${warn}</button>
        ${manage}
      </span>`;
  }

  function shelfSection(door, shelfKey, meta) {
    const items = INVENTORY.filter(c => c.door === door.id && c.shelf === shelfKey);
    const addBtn = teacherAuth.authenticated ? `
      <button onclick="handleAdd(${door.id}, '${shelfKey}')"
        class="px-3 py-1.5 rounded-full border border-dashed border-primary-container text-primary-container text-sm hover:bg-surface-container-high transition">
        + 새 시약 추가
      </button>` : '';
    return `
      <section class="bg-surface rounded-xl border border-outline-variant shadow-sm overflow-hidden">
        <div class="p-stack-md border-b border-outline-variant bg-surface-container-low flex items-center justify-between">
          <h3 class="font-bold text-on-surface">${meta.title}</h3>
          ${meta.note ? `<span class="text-xs text-on-surface-variant">${meta.note}</span>` : ''}
        </div>
        <div class="p-stack-md flex flex-wrap gap-2 items-center">
          ${items.map(chipHtml).join('') || '<span class="text-on-surface-variant text-sm">등록된 물질 없음</span>'}
          ${addBtn}
        </div>
      </section>`;
  }

  function renderDoor(doorId) {
    currentDoorId = doorId;
    const door = REAGENT_DOORS.find(d => d.id === doorId);
    doorPanelsEl.innerHTML = `
      <h2 class="text-headline-md font-bold flex items-center gap-2">
        <span class="material-symbols-outlined text-primary-container">door_front</span>
        ${door.label} 보관 현황
      </h2>
      ${shelfSection(door, 'top', door.top)}
      ${shelfSection(door, 'bottom', door.bottom)}
    `;
  }

  function renderTabs() {
    doorTabsEl.innerHTML = REAGENT_DOORS.map(d => `
      <button data-door="${d.id}" class="door-tab ${d.id === currentDoorId ? 'active' : ''} px-4 py-2 rounded-lg border border-outline-variant text-left font-medium hover:bg-surface-container-low transition">
        ${d.label}
      </button>`).join('');
    doorTabsEl.querySelectorAll('.door-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        doorTabsEl.querySelectorAll('.door-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderDoor(Number(btn.dataset.door));
      });
    });
  }

  function updateAuthUI() {
    authStatusEl.textContent = teacherAuth.authenticated
      ? `✅ ${teacherAuth.teacher} 님 인증됨 (추가·제거·사용기록 가능)`
      : (isBackendConfigured() ? '' : '⚠️ 재고 관리 서버가 아직 연결되지 않았습니다 (조회만 가능)');
    authBtn.textContent = teacherAuth.authenticated ? '로그아웃' : '🔒 교사 인증';
    manageBtn.classList.toggle('hidden', !teacherAuth.authenticated);
  }

  authBtn.addEventListener('click', () => {
    if (teacherAuth.authenticated) {
      teacherLogout();
      updateAuthUI();
      renderTabs();
      renderDoor(currentDoorId);
      return;
    }
    const name = prompt('이름을 입력하세요 (기록에 남습니다):', '');
    if (name === null || name.trim() === '') return;
    const pw = prompt('교사 비밀번호를 입력하세요:');
    if (pw === null) return;
    teacherLogin(pw, name.trim());
    updateAuthUI();
    renderTabs();
    renderDoor(currentDoorId);
  });

  async function handleAdd(door, shelf) {
    const name = prompt('추가할 시약명을 정확히 입력하세요:');
    if (!name) return;
    const group = prompt('분류(예: 무기산, 유기일반 등 — 생략 가능):', '') || '';
    const special = confirm('극약·특별관리 물질입니까?\n(예: 확인 누르기 / 아니오: 취소 누르기)');
    const note = prompt('메모(구입일, 구매처 등 — 생략 가능):', '') || '';
    const result = await addChemical({ name: name.trim(), door, shelf, group, special, note });
    if (result.ok) { renderDoor(currentDoorId); alert(`"${name}" 등록 완료`); }
  }

  async function handleRemove(name) {
    if (!confirm(`"${name}"을(를) 재고에서 제거 처리할까요?\n(기록은 삭제되지 않고 이력으로 계속 남습니다)`)) return;
    const note = prompt('제거 사유(전출/폐기/소진 등 — 생략 가능):', '') || '';
    const result = await removeChemical(name, note);
    if (result.ok) { renderDoor(currentDoorId); alert(`"${name}" 제거 처리 완료`); }
  }

  async function handleUse(name) {
    const note = prompt(`"${name}" 사용 기록을 남깁니다. 용도/수량 등을 적어주세요:`, '') || '';
    const result = await useChemical(name, note);
    if (result.ok) alert('사용 기록이 저장되었습니다.');
  }

  /* ── 시약 추가/제거 모달 ── */
  const manageBtn = document.getElementById('manageBtn');
  const manageModal = document.getElementById('manageModal');
  const manageModalBody = document.getElementById('manageModalBody');

  function openModal() { manageModal.classList.remove('hidden'); manageModal.classList.add('flex'); }
  function closeModal() { manageModal.classList.add('hidden'); manageModal.classList.remove('flex'); }

  function showChoiceStep() {
    manageModalBody.innerHTML = `
      <h3 class="text-lg font-bold mb-stack-md text-on-surface">시약 추가 / 제거</h3>
      <div class="flex gap-stack-md">
        <button id="btnGoAdd" class="flex-1 py-3 rounded-lg bg-primary-container text-on-primary font-medium hover:opacity-90 transition">+ 추가</button>
        <button id="btnGoRemove" class="flex-1 py-3 rounded-lg bg-error text-on-error font-medium hover:opacity-90 transition">− 제거</button>
      </div>
      <button id="btnCancel0" class="mt-stack-md text-sm text-on-surface-variant hover:underline">닫기</button>
    `;
    document.getElementById('btnGoAdd').onclick = showAddStep;
    document.getElementById('btnGoRemove').onclick = showRemoveStep;
    document.getElementById('btnCancel0').onclick = closeModal;
    openModal();
  }

  function showAddStep() {
    manageModalBody.innerHTML = `
      <h3 class="text-lg font-bold mb-stack-md text-on-surface">새 시약 추가</h3>
      <label class="text-sm text-on-surface-variant">시약명</label>
      <input id="addNameInput" type="text" class="w-full mt-1 mb-stack-md px-3 py-2 rounded-lg border border-outline-variant" placeholder="예: 염산" />
      <div class="flex gap-2">
        <button id="btnClassify" class="flex-1 py-2 rounded-lg bg-primary-container text-on-primary font-medium hover:opacity-90 transition">위치 찾기</button>
        <button id="btnBack1" class="py-2 px-3 rounded-lg border border-outline-variant">뒤로</button>
      </div>
      <div id="classifyResult" class="mt-stack-md"></div>
    `;
    document.getElementById('btnBack1').onclick = showChoiceStep;
    document.getElementById('btnClassify').onclick = () => {
      const name = document.getElementById('addNameInput').value.trim();
      if (!name) { alert('시약명을 입력해주세요.'); return; }
      renderClassifyResult(name, classifyChemical(name));
    };
  }

  function renderClassifyResult(name, guess) {
    const doorMeta = REAGENT_DOORS.find(d => d.id === guess.door);
    const shelfMeta = guess.shelf === 'top' ? doorMeta.top : doorMeta.bottom;
    const confidenceLabel = {
      exact: '✅ 예전에 등록된 적 있는 물질과 이름이 같아요 — 그때와 같은 위치로 제안합니다.',
      guess: '🔎 이름 패턴으로 추정한 위치입니다. 아래에서 확인/수정해주세요.',
      unknown: '❓ 자동으로 분류하지 못했습니다. 아래에서 문/칸을 직접 선택해주세요.'
    }[guess.confidence];

    manageModalBody.innerHTML = `
      <h3 class="text-lg font-bold mb-stack-md text-on-surface">새 시약 추가</h3>
      <div class="p-stack-md rounded-lg border border-outline-variant bg-surface-container-low text-sm space-y-2">
        <p class="text-xs text-on-surface-variant">${confidenceLabel}</p>
        <p><b>${name}</b> → <b>${doorMeta.label} ${guess.shelf === 'top' ? '상단' : '하단'}</b> (${shelfMeta.title})</p>
        <label class="block text-xs text-on-surface-variant mt-2">위치가 다르면 직접 선택하세요</label>
        <div class="flex gap-2">
          <select id="doorSelect" class="flex-1 px-2 py-1.5 rounded-lg border border-outline-variant text-sm">
            ${REAGENT_DOORS.map(d => `<option value="${d.id}" ${d.id === guess.door ? 'selected' : ''}>${d.label}</option>`).join('')}
          </select>
          <select id="shelfSelect" class="flex-1 px-2 py-1.5 rounded-lg border border-outline-variant text-sm">
            <option value="top" ${guess.shelf === 'top' ? 'selected' : ''}>상단</option>
            <option value="bottom" ${guess.shelf === 'bottom' ? 'selected' : ''}>하단</option>
          </select>
        </div>
        <label class="flex items-center gap-1 text-xs mt-2">
          <input type="checkbox" id="specialCheck" ${guess.special ? 'checked' : ''}/> 극약·특별관리 물질 (이중 잠금 필요)
        </label>
        <button id="btnConfirmAdd" class="w-full mt-2 py-2 rounded-lg bg-tertiary text-white font-medium hover:opacity-90 transition">이 위치로 등록</button>
        <button id="btnBack1b" class="w-full text-sm text-on-surface-variant hover:underline">뒤로</button>
      </div>
    `;
    document.getElementById('btnBack1b').onclick = showAddStep;
    document.getElementById('btnConfirmAdd').onclick = async () => {
      const door = Number(document.getElementById('doorSelect').value);
      const shelf = document.getElementById('shelfSelect').value;
      const special = document.getElementById('specialCheck').checked;
      const note = prompt('메모(구입일 등, 생략 가능):', '') || '';
      const result = await addChemical({ name, door, shelf, group: guess.group, special, note });
      if (result.ok) {
        closeModal();
        renderTabs();
        renderDoor(door);
        alert(`"${name}" 등록 완료 (${REAGENT_DOORS.find(d => d.id === door).label})`);
      }
    };
  }

  function showRemoveStep() {
    const options = INVENTORY
      .map(c => `<option value="${c.name.replace(/"/g, '&quot;')}">${c.name} (${c.door}번 문 · ${c.shelf === 'top' ? '상단' : '하단'})</option>`)
      .join('');
    manageModalBody.innerHTML = `
      <h3 class="text-lg font-bold mb-stack-md text-on-surface">시약 제거</h3>
      <label class="text-sm text-on-surface-variant">제거할 시약을 선택하세요</label>
      <select id="removeSelect" class="w-full mt-1 mb-stack-md px-3 py-2 rounded-lg border border-outline-variant">
        ${options || '<option disabled>등록된 시약이 없습니다</option>'}
      </select>
      <div class="flex gap-2">
        <button id="btnConfirmRemove" class="flex-1 py-2 rounded-lg bg-error text-on-error font-medium hover:opacity-90 transition">제거</button>
        <button id="btnBack2" class="py-2 px-3 rounded-lg border border-outline-variant">뒤로</button>
      </div>
    `;
    document.getElementById('btnBack2').onclick = showChoiceStep;
    document.getElementById('btnConfirmRemove').onclick = async () => {
      const name = document.getElementById('removeSelect').value;
      if (!name) return;
      if (!confirm(`"${name}"을(를) 제거할까요?\n(기록은 삭제되지 않고 이력으로 남습니다)`)) return;
      const note = prompt('제거 사유(전출/폐기/소진 등 — 생략 가능):', '') || '';
      const result = await removeChemical(name, note);
      if (result.ok) {
        closeModal();
        renderTabs();
        renderDoor(currentDoorId);
        alert(`"${name}" 제거 처리 완료`);
      }
    };
  }

  manageBtn.addEventListener('click', showChoiceStep);

  (async function init() {
    updateAuthUI();
    await loadInventory();
    renderTabs();
    renderDoor(REAGENT_DOORS[0].id);
  })();
</script>
</body>
</html>
